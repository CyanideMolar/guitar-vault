name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install and build
        run: npm ci && npx prisma generate && npm run build

      - name: Sync to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env.local' \
            --exclude='prisma/dev.db' \
            --exclude='public/uploads' \
            --exclude='node_modules' \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./ $EC2_USER@$EC2_HOST:/home/ec2-user/guitar-vault/
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            $EC2_USER@$EC2_HOST "cd ~/guitar-vault && \
              new=\$(md5sum package-lock.json | cut -d' ' -f1) && \
              old=\$(cat .pkg-lock-hash 2>/dev/null || echo '') && \
              if [ \"\$new\" != \"\$old\" ]; then \
                npm ci && echo \"\$new\" > .pkg-lock-hash; \
              fi && \
              npm rebuild && \
              pm2 restart guitar-vault"
          rm /tmp/deploy_key
